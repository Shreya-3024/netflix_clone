<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Netflix Clone - Login</title>
  <link rel="stylesheet" href="login-style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
  <div class="login-container">
    <!-- Background -->
    <div class="login-background">
      <div class="netflix-logo-login">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"
          alt="Netflix"
        />
      </div>
    </div>

    <!-- Login Content -->
    <div class="login-content">
      <div class="login-form-container">
        <!-- Tabs -->
        <div class="login-tabs">
          <button class="tab-btn active" data-tab="signin">Sign In</button>
          <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <!-- Sign In Form -->
        <form class="login-form active-form" id="signinForm">
          <h1>Sign In to Netflix</h1>
          
          <div class="form-group">
            <label for="signin-email">Email or Mobile Number</label>
            <input
              type="email"
              id="signin-email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="form-group">
            <label for="signin-password">Password</label>
            <input
              type="password"
              id="signin-password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="form-remember">
            <label>
              <input type="checkbox" id="remember-me" />
              Remember me
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn-signin">Sign In</button>

          <div class="signup-link">
            New to Netflix?
            <a href="#" class="switch-tab" data-tab="register">Sign up now</a>
          </div>
        </form>

        <!-- Register Form -->
        <form class="login-form" id="registerForm">
          <h1>Create Your Netflix Account</h1>

          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input
              type="text"
              id="register-name"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="register-email">Email</label>
            <input
              type="email"
              id="register-email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input
              type="password"
              id="register-password"
              placeholder="Create a password"
              required
            />
          </div>

          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input
              type="password"
              id="register-confirm"
              placeholder="Confirm your password"
              required
            />
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="agree-terms" />
              I agree to Netflix Terms of Service
            </label>
          </div>

          <button type="submit" class="btn-signup">Create Account</button>

          <div class="signin-link">
            Already have an account?
            <a href="#" class="switch-tab" data-tab="signin">Sign in</a>
          </div>
        </form>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <p>Or continue with</p>
        <div class="social-buttons">
          <button class="social-btn facebook-btn">
            <i class="fab fa-facebook-f"></i>
          </button>
          <button class="social-btn google-btn">
            <i class="fab fa-google"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>&copy; 2024 Netflix Clone. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">FAQ</a>
        <a href="#">Help Center</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
      </div>
    </div>
  </div>

  <script src="login-script.js"></script>
</body>
</html>
